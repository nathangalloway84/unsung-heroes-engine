version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -w api

  ui:
    build:
      context: .
      dockerfile: ui/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    command: npm run dev -w ui

networks:
  default:
    name: unsung-heroes-network
